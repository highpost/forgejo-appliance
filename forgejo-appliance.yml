#cloud-config

# environment configuration
environment:
  DEBIAN_FRONTEND: noninteractive

# package repositories configuration
apt:
  preserve_sources_list: true

# required packages
package_upgrade: true
packages:
  - ca-certificates
  - curl
  - git
  - git-lfs
  - gnupg
  - locales
  - lsb-release
  - postgresql
  - postgresql-client
  - sudo
  - unzip
  - zsh

# user provisioning
users:
  - name: forgejo-admin
    uid: 1001
    shell: /bin/zsh
    system: false
    comment: forgejo appliance administrator
    home: /home/forgejo-admin
    create_home: true

# system files provisioning
write_files:
  # WezTerm skeleton files for user config
  - path: /etc/skel/.zshenv
    owner: root:root
    permissions: '0644'
    content: |
      export TERM='wezterm'
      export LANG='en_US.UTF-8'
      export LC_ALL='en_US.UTF-8'

  # Forgejo systemd service unit declaration
  - path: /etc/systemd/system/forgejo.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Forgejo
      After=network-online.target postgresql.service
      Wants=network-online.target postgresql.service

      [Service]
      RestartSec=2s
      Type=simple
      User=forgejo-admin
      Group=forgejo-admin
      RuntimeDirectory=forgejo
      RuntimeDirectoryMode=0755
      WorkingDirectory=/var/lib/forgejo
      ExecStart=/home/forgejo-admin/bin/forgejo web --config /etc/forgejo/app.ini
      Restart=always
      Environment='USER=forgejo-admin HOME=/home/forgejo-admin FORGEJO_WORK_DIR=/var/lib/forgejo PGUSER=forgejo-admin PATH=/home/forgejo-admin/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'

      [Install]
      WantedBy=multi-user.target

  # tsbridge TOML configuration file
  - path: /etc/tsbridge/tsbridge.toml
    owner: root:root
    permissions: '0600'
    content: |
      [tailscale]
      oauth_client_id_env = "TS_OAUTH_CLIENT_ID"
      oauth_client_secret_env = "TS_OAUTH_CLIENT_SECRET"
      default_tags = ["tag:myservers"]
      state_dir    = "/var/lib/tsbridge"
      listen_addr  = ":443"

      # web traffic (maps Tailnet HTTPS -> local UNIX socket)
      [[services]]
      name         = "YOUR_FORGEJO_HOSTNAME"
      hostname     = "YOUR_FORGEJO_HOSTNAME"
      backend_addr = "unix:///run/forgejo/forgejo.sock"

  # tsbridge systemd service unit configuration
  - path: /etc/systemd/system/tsbridge.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Tailscale Bridge Proxy Manager
      After=network-online.target forgejo.service
      Wants=network-online.target forgejo.service

      [Service]
      Type=simple
      ExecStart=/usr/local/bin/tsbridge -config /etc/tsbridge/tsbridge.toml
      Restart=always
      RestartSec=5s
      EnvironmentFile=-/etc/tsbridge/tsbridge.env

      [Install]
      WantedBy=multi-user.target

  # Forgejo app.ini configuration
  - path: /etc/forgejo/app.ini
    owner: root:root
    permissions: '0660'
    content: |
      APP_NAME         = Private Forgejo
      RUN_USER         = forgejo-admin
      WORK_PATH        = /var/lib/forgejo
      RUN_MODE         = prod

      [repository]
      ROOT             = /var/lib/forgejo/data/forgejo-repositories

      [server]
      DOMAIN           = forgejo-appliance.YOUR_TS_TAILNET.ts.net
      PROTOCOL         = http+unix
      HTTP_ADDR        = /run/forgejo/forgejo.sock
      HTTP_PORT        = 3000
      ROOT_URL         = https://forgejo-appliance.YOUR_TS_TAILNET.ts.net/
      DISABLE_SSH      = true

      [database]
      DB_TYPE          = postgres
      HOST             = /var/run/postgresql
      NAME             = forgejo
      USER             = forgejo-admin
      PASSWORD         =
      SSL_MODE         = disable

      [security]
      INSTALL_LOCK     = true
      SECRET_KEY       = PlaceholderForAutogeneratedString

      [mailer]
      ENABLED          = true
      FROM             = "Forgejo notification" <forgejo-noreply@wordbasket.app>
      PROTOCOL         = smtps
      SMTP_ADDR        = smtp.gmail.com
      SMTP_PORT        = 465
      USER             = YOUR_GOOGLE_WORKSPACE_ACCOUNT
      PASSWD           = YOUR_GOOGLE_SMTP_PASSWORD
      FORCE_TRUST_SERVER_CERT = false

# post-provisioning shell commands
runcmd:
  # compile system locale database definitions
  - locale-gen en_US.UTF-8
  - update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8

  # extract and configure terminfo support for WezTerm window mapping
  - curl -fsSL -o /tmp/wezterm.info https://raw.githubusercontent.com/wez/wezterm/main/termwiz/data/wezterm.terminfo
  - tic -x -o /usr/share/terminfo /tmp/wezterm.info
  - rm -f /tmp/wezterm.info

  # pre-configure PostgreSQL HBA policies for trust auth on local connections
  - |
    cat << 'EOF' > /etc/postgresql/18/main/pg_hba.conf
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            trust
    host    all             all             ::1/128                 trust
    EOF

  # force PostgreSQL to use the new pg_hba.conf rules
  - systemctl reload postgresql
  - until pg_isready; do sleep 1; done

  # create the default user
  - sudo -u postgres psql -c "CREATE USER \"forgejo-admin\";"
  - sudo -u postgres psql -c "CREATE DATABASE forgejo OWNER \"forgejo-admin\";"

  # prepare explicit system data directories for forgejo service runtimes
  - mkdir -p /var/lib/forgejo/custom /var/lib/forgejo/data /var/lib/forgejo/log /etc/forgejo /home/forgejo-admin/bin /run/forgejo
  - chown -R forgejo-admin:forgejo-admin /var/lib/forgejo /run/forgejo
  - chmod -R 770 /var/lib/forgejo /run/forgejo

  # download, extract and install the Forgejo Linux arm64 binary
  - curl -L https://codeberg.org/forgejo/forgejo/releases/download/v15.0.2/forgejo-15.0.2-linux-arm64.xz -o /tmp/forgejo.xz
  - unxz /tmp/forgejo.xz
  - cp /tmp/forgejo /home/forgejo-admin/bin/forgejo
  - chmod 755 /home/forgejo-admin/bin/forgejo
  - chown forgejo-admin:forgejo-admin /home/forgejo-admin/bin/forgejo

  # download, extract and install the tsbridge binary
  - mkdir -p /etc/tsbridge /var/lib/tsbridge
  - curl -L https://github.com/jtdowney/tsbridge/releases/download/v0.15.0/tsbridge_0.15.0_linux_arm64.tar.gz -o /tmp/tsbridge.tar.gz
  - tar -xzf /tmp/tsbridge.tar.gz -C /usr/local/bin/
  - chmod 755 /usr/local/bin/tsbridge
  - rm -f /tmp/tsbridge.tar.gz

  # user configuration
  - usermod -p "*" forgejo-admin
  - |
    cat << 'EOF' > /home/forgejo-admin/.zshenv
    export TERM='wezterm'
    export LANG='en_US.UTF-8'
    export LC_ALL='en_US.UTF-8'
    export PATH="$HOME/bin:$PATH"
    EOF

  - chown forgejo-admin:forgejo-admin /home/forgejo-admin/.zshenv
  - chmod 0644 /home/forgejo-admin/.zshenv

  # safely hand ownership of app.ini over to the admin group now that it exists
  - chown -R root:forgejo-admin /etc/forgejo
  - chmod 770 /etc/forgejo
  - chown forgejo-admin:forgejo-admin /etc/forgejo/app.ini
  - chmod 660 /etc/forgejo/app.ini

  # generate a secure, randomized string for SECRET_KEY and inject it into the Forgejo configuration
  - sed -i "s|PlaceholderForAutogeneratedString|$(openssl rand -hex 32)|g" /etc/forgejo/app.ini

  # fire up Forgejo and ready the system layer
  - systemctl daemon-reload
  - systemctl enable --now forgejo
